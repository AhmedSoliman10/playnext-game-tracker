name: Bug report
description: Report something broken in PlayNext
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve PlayNext.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser or device
      placeholder: Chrome on Windows, Safari on iPhone, etc.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video
      description: Add screenshots or a short recording if useful.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
